    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#4a5570" flood-opacity=".25"/></filter>
  </defs>

  <!-- connectors -->
  <g stroke="#DDB04E" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round">
