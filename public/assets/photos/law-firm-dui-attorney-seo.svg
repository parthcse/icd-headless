    <g filter="url(#sh)"><rect x="110" y="514" width="230" height="92" rx="14" fill="#fff"/></g><text x="225" y="554" font-weight="700">Guest Posts</text><text x="225" y="580" font-size="16" fill="#B8862E">DA 78</text>
    <g filter="url(#sh)"><rect x="180" y="756" width="230" height="92" rx="14" fill="#fff"/></g><text x="295" y="796" font-weight="700">HARO</text><text x="295" y="822" font-size="16" fill="#B8862E">Press mentions</text>
    <g filter="url(#sh)"><rect x="1150" y="214" width="240" height="92" rx="14" fill="#fff"/></g><text x="1270" y="254" font-weight="700">Bar Association</text><text x="1270" y="280" font-size="16" fill="#B8862E">DA 84</text>
    <g filter="url(#sh)"><rect x="1200" y="494" width="230" height="92" rx="14" fill="#fff"/></g><text x="1315" y="534" font-weight="700">Reviews</text><text x="1315" y="560" font-size="16" fill="#B8862E">Testimonials</text>
    <g filter="url(#sh)"><rect x="1120" y="756" width="240" height="92" rx="14" fill="#fff"/></g><text x="1240" y="796" font-weight="700">Infographics</text><text x="1240" y="822" font-size="16" fill="#B8862E">Embedded links</text>
  </g>

  <!-- central node: gavel -->
