    <g transform="translate(970,372)"><circle r="20" fill="#fff" stroke="#DDB04E" stroke-width="2"/><path d="M-8 0 a5 5 0 0 1 5 -5 h4 M8 0 a5 5 0 0 1 -5 5 h-4" fill="none" stroke="#B8862E" stroke-width="3"/><line x1="-4" y1="0" x2="4" y2="0" stroke="#B8862E" stroke-width="3"/></g>
  </g>

  <!-- source nodes -->
