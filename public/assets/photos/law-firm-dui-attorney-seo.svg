    <rect x="-70" y="-26" width="120" height="52" rx="12" fill="url(#gold)"/>
    <rect x="-58" y="-26" width="10" height="52" fill="#C6902F"/><rect x="38" y="-26" width="10" height="52" fill="#C6902F"/>
    <!-- handle -->
