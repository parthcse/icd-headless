<svg xmlns="http://www.w3.org/2000/svg" viewBox="44 90 592 452" fill="none" role="img" aria-label="Magento development services tailored to your business illustration">
  <defs>
    <linearGradient id="mg-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9A56A"/>
      <stop offset="1" stop-color="#F17E3F"/>
    </linearGradient>
    <linearGradient id="mg-orange2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F17E3F"/>
      <stop offset="1" stop-color="#E0561F"/>
    </linearGradient>
    <linearGradient id="mg-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F9A56A"/>
      <stop offset="1" stop-color="#F17E3F"/>
    </linearGradient>
    <filter id="mg-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Main storefront / build window -->
  <g filter="url(#mg-shadow)">
    <rect x="120" y="120" width="400" height="300" rx="24" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>

    <!-- title bar -->
    <circle cx="178" cy="150" r="5.5" fill="#F17E3F"/>
    <circle cx="196" cy="150" r="5.5" fill="#3a3a3a"/>
    <circle cx="214" cy="150" r="5.5" fill="#3a3a3a"/>
    <rect x="245" y="142" width="240" height="16" rx="8" fill="#242424"/>
    <circle cx="474" cy="150" r="4" fill="#F17E3F"/>
    <line x1="136" y1="172" x2="504" y2="172" stroke="#242424" stroke-width="1.5"/>

    <!-- storefront product cards -->
    <!-- featured -->
    <rect x="142" y="190" width="108" height="158" rx="10" fill="#222222" stroke="#2f2f2f" stroke-width="1"/>
    <rect x="152" y="200" width="88" height="70" rx="8" fill="url(#mg-orange)"/>
    <path d="M186 226 h20 l-3 22 h-14 z" fill="#ffffff" opacity="0.92"/>
    <path d="M190 226 a6 6 0 0 1 12 0" fill="none" stroke="#ffffff" stroke-width="2.4" opacity="0.92"/>
    <rect x="152" y="280" width="88" height="8" rx="4" fill="#3a3a3a"/>
    <rect x="152" y="294" width="56" height="8" rx="4" fill="#2f2f2f"/>
    <rect x="152" y="316" width="40" height="12" rx="6" fill="#444444"/>
    <rect x="204" y="313" width="36" height="18" rx="9" fill="url(#mg-orange2)"/>

    <!-- card 2 -->
    <rect x="272" y="190" width="108" height="158" rx="10" fill="#222222" stroke="#2f2f2f" stroke-width="1"/>
    <rect x="282" y="200" width="88" height="70" rx="8" fill="#2e2e2e"/>
    <circle cx="303" cy="222" r="7" fill="#3d3d3d"/>
    <path d="M292 258 l14 -16 l12 12 l10 -9 l16 13 v6 h-52 z" fill="#3d3d3d"/>
    <rect x="282" y="280" width="88" height="8" rx="4" fill="#3a3a3a"/>
    <rect x="282" y="294" width="56" height="8" rx="4" fill="#2f2f2f"/>
    <rect x="282" y="316" width="40" height="12" rx="6" fill="#444444"/>
    <rect x="334" y="313" width="36" height="18" rx="9" fill="#333333"/>

    <!-- card 3 -->
    <rect x="402" y="190" width="108" height="158" rx="10" fill="#222222" stroke="#2f2f2f" stroke-width="1"/>
    <rect x="412" y="200" width="88" height="70" rx="8" fill="#2e2e2e"/>
    <circle cx="433" cy="222" r="7" fill="#3d3d3d"/>
    <path d="M422 258 l14 -16 l12 12 l10 -9 l16 13 v6 h-52 z" fill="#3d3d3d"/>
    <rect x="412" y="280" width="88" height="8" rx="4" fill="#3a3a3a"/>
    <rect x="412" y="294" width="56" height="8" rx="4" fill="#2f2f2f"/>
    <rect x="412" y="316" width="40" height="12" rx="6" fill="#444444"/>
    <rect x="464" y="313" width="36" height="18" rx="9" fill="#333333"/>

    <!-- tailored build bar -->
    <rect x="142" y="372" width="250" height="14" rx="7" fill="#2b2b2b"/>
    <rect x="142" y="372" width="156" height="14" rx="7" fill="url(#mg-line)"/>
    <!-- gear (tailored) -->
    <g transform="translate(486 379)">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#F17E3F" stroke-width="4"/>
      <circle cx="0" cy="0" r="5" fill="#F9A56A"/>
      <g stroke="#F17E3F" stroke-width="4" stroke-linecap="round">
        <line x1="0" y1="-21" x2="0" y2="-16"/>
        <line x1="0" y1="21" x2="0" y2="16"/>
        <line x1="-21" y1="0" x2="-16" y2="0"/>
        <line x1="21" y1="0" x2="16" y2="0"/>
        <line x1="-15" y1="-15" x2="-11" y2="-11"/>
        <line x1="15" y1="15" x2="11" y2="11"/>
        <line x1="15" y1="-15" x2="11" y2="-11"/>
        <line x1="-15" y1="15" x2="-11" y2="11"/>
      </g>
    </g>
  </g>

  <!-- Magento hexagon badge -->
  <g filter="url(#mg-shadow)">
    <circle cx="120" cy="150" r="46" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <polygon points="120,124 141,136 141,164 120,176 99,164 99,136" fill="none" stroke="url(#mg-orange)" stroke-width="3"/>
    <path d="M108 166 V134 L120 152 L132 134 V166" fill="none" stroke="#F9A56A" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="120" y1="158" x2="120" y2="176" stroke="#F17E3F" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Extension / custom code chip -->
  <g filter="url(#mg-shadow)">
    <rect x="468" y="176" width="152" height="86" rx="16" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <path d="M498 204 L487 219 L498 234" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M556 204 L567 219 L556 234" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="537" y1="200" x2="519" y2="238" stroke="url(#mg-line)" stroke-width="3.6" stroke-linecap="round"/>
    <rect x="486" y="246" width="118" height="7" rx="3.5" fill="#333333"/>
  </g>

  <!-- Performance gauge chip -->
  <g filter="url(#mg-shadow)">
    <rect x="60" y="410" width="186" height="98" rx="16" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <path d="M78 478 A34 34 0 0 1 146 478" fill="none" stroke="#2f2f2f" stroke-width="8" stroke-linecap="round"/>
    <path d="M78 478 A34 34 0 0 1 134 455" fill="none" stroke="url(#mg-line)" stroke-width="8" stroke-linecap="round"/>
    <line x1="112" y1="478" x2="130" y2="461" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="112" cy="478" r="4.5" fill="#F9A56A"/>
    <rect x="164" y="440" width="66" height="9" rx="4.5" fill="#333333"/>
    <rect x="164" y="459" width="46" height="9" rx="4.5" fill="#282828"/>
    <path d="M170 486 l7 -9 l7 9" fill="none" stroke="#F17E3F" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="188" y="480" width="42" height="8" rx="4" fill="#282828"/>
  </g>

  <!-- ERP / integration chip -->
  <g filter="url(#mg-shadow)">
    <rect x="404" y="428" width="196" height="68" rx="16" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <line x1="440" y1="462" x2="488" y2="446" stroke="#3a3a3a" stroke-width="3"/>
    <line x1="440" y1="462" x2="488" y2="480" stroke="#3a3a3a" stroke-width="3"/>
    <circle cx="440" cy="462" r="11" fill="url(#mg-orange2)"/>
    <circle cx="490" cy="446" r="8" fill="#333333" stroke="#3d3d3d" stroke-width="1.5"/>
    <circle cx="490" cy="480" r="8" fill="#333333" stroke="#3d3d3d" stroke-width="1.5"/>
    <rect x="516" y="452" width="70" height="9" rx="4.5" fill="#333333"/>
    <rect x="516" y="469" width="48" height="9" rx="4.5" fill="#282828"/>
  </g>
</svg>
