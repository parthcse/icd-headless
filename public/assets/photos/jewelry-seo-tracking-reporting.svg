  <g font-size="19" fill="#2A3342">
    <text x="1082" y="418">diamond rings</text><text x="1082" y="486">gold necklaces</text><text x="1082" y="554">custom jewelry</text><text x="1082" y="622">bridal sets</text><text x="1082" y="690">jewelry store</text>
  </g>
  <g text-anchor="end">
    <text x="1370" y="418" font-size="20" font-weight="700" fill="#2A3342">#1</text><text x="1370" y="442" font-size="15" fill="#3E9A50">▲ 6</text>
    <text x="1370" y="486" font-size="20" font-weight="700" fill="#2A3342">#3</text><text x="1370" y="510" font-size="15" fill="#3E9A50">▲ 4</text>
    <text x="1370" y="554" font-size="20" font-weight="700" fill="#2A3342">#2</text><text x="1370" y="578" font-size="15" fill="#3E9A50">▲ 9</text>
    <text x="1370" y="622" font-size="20" font-weight="700" fill="#2A3342">#5</text><text x="1370" y="646" font-size="15" fill="#3E9A50">▲ 3</text>
    <text x="1370" y="690" font-size="20" font-weight="700" fill="#2A3342">#4</text><text x="1370" y="714" font-size="15" fill="#3E9A50">▲ 5</text>
  </g>
  <g stroke="#F0F2F6" stroke-width="1.5"><line x1="1082" y1="440" x2="1368" y2="440"/><line x1="1082" y1="508" x2="1368" y2="508"/><line x1="1082" y1="576" x2="1368" y2="576"/><line x1="1082" y1="644" x2="1368" y2="644"/></g>
</svg>
