<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F3D888"/><stop offset=".5" stop-color="#DDB04E"/><stop offset="1" stop-color="#B8862E"/></linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#DDB04E" stop-opacity=".35"/><stop offset="1" stop-color="#DDB04E" stop-opacity="0"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#7C8CA8" flood-opacity=".2"/></filter>
  </defs>

  <!-- Dashboard -->
  <g filter="url(#sh)"><rect x="110" y="170" width="900" height="660" rx="20" fill="#fff"/></g>
  <text x="150" y="238" font-size="28" font-weight="700" fill="#2A3342">SEO Performance Report</text>
  <rect x="820" y="208" width="150" height="42" rx="21" fill="#FFF3DA"/><text x="895" y="235" font-size="18" fill="#B8862E" text-anchor="middle">Last 6 months</text>

  <!-- stat tiles -->
  <g>
    <rect x="150" y="280" width="260" height="120" rx="14" fill="#F7F9FC"/>
    <text x="176" y="322" font-size="19" fill="#8A94A6">Organic Traffic</text><text x="176" y="366" font-size="34" font-weight="700" fill="#2A3342">48.2K</text><text x="330" y="366" font-size="19" fill="#3E9A50">▲ 62%</text>
    <rect x="430" y="280" width="260" height="120" rx="14" fill="#F7F9FC"/>
    <text x="456" y="322" font-size="19" fill="#8A94A6">Keywords Top 10</text><text x="456" y="366" font-size="34" font-weight="700" fill="#2A3342">184</text><text x="610" y="366" font-size="19" fill="#3E9A50">▲ 47</text>
    <rect x="710" y="280" width="260" height="120" rx="14" fill="#F7F9FC"/>
    <text x="736" y="322" font-size="19" fill="#8A94A6">Conversions</text><text x="736" y="366" font-size="34" font-weight="700" fill="#2A3342">1,180</text><text x="890" y="366" font-size="19" fill="#3E9A50">▲ 38%</text>
  </g>

  <!-- line chart -->
  <rect x="150" y="440" width="820" height="350" rx="14" fill="#F7F9FC"/>
  <g stroke="#E7EBF2" stroke-width="1.5"><line x1="190" y1="510" x2="930" y2="510"/><line x1="190" y1="590" x2="930" y2="590"/><line x1="190" y1="670" x2="930" y2="670"/><line x1="190" y1="750" x2="930" y2="750"/></g>
  <path d="M190 720 L310 700 L430 640 L550 650 L670 560 L790 500 L910 470 L910 750 L190 750 Z" fill="url(#area)"/>
  <polyline points="190,720 310,700 430,640 550,650 670,560 790,500 910,470" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#DDB04E"><circle cx="190" cy="720" r="7"/><circle cx="310" cy="700" r="7"/><circle cx="430" cy="640" r="7"/><circle cx="550" cy="650" r="7"/><circle cx="670" cy="560" r="7"/><circle cx="790" cy="500" r="7"/><circle cx="910" cy="470" r="7" stroke="#fff" stroke-width="3"/></g>
  <g fill="#8A94A6" font-size="17" text-anchor="middle"><text x="190" y="782">Jan</text><text x="310" y="782">Feb</text><text x="430" y="782">Mar</text><text x="550" y="782">Apr</text><text x="670" y="782">May</text><text x="790" y="782">Jun</text><text x="910" y="782">Jul</text></g>

  <!-- keyword ranking card -->
