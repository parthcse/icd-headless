<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F3D888"/><stop offset=".5" stop-color="#DDB04E"/><stop offset="1" stop-color="#B8862E"/></linearGradient>
    <linearGradient id="dia" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EAF4FF"/><stop offset="1" stop-color="#B9D6F2"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#7C8CA8" flood-opacity=".2"/></filter>
  </defs>

  <!-- connector links -->
  <g stroke="#DDB04E" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round">
    <line x1="750" y1="500" x2="300" y2="270"/><line x1="750" y1="500" x2="270" y2="560"/><line x1="750" y1="500" x2="330" y2="790"/>
    <line x1="750" y1="500" x2="1180" y2="250"/><line x1="750" y1="500" x2="1230" y2="540"/><line x1="750" y1="500" x2="1150" y2="800"/>
  </g>
  <!-- link chip on each line -->
  <g>
    <g transform="translate(510,378)"><circle r="20" fill="#fff" stroke="#DDB04E" stroke-width="2"/><path d="M-8 0 a5 5 0 0 1 5 -5 h4 M8 0 a5 5 0 0 1 -5 5 h-4" fill="none" stroke="#B8862E" stroke-width="3"/><line x1="-4" y1="0" x2="4" y2="0" stroke="#B8862E" stroke-width="3"/></g>
    <g transform="translate(965,368)"><circle r="20" fill="#fff" stroke="#DDB04E" stroke-width="2"/><path d="M-8 0 a5 5 0 0 1 5 -5 h4 M8 0 a5 5 0 0 1 -5 5 h-4" fill="none" stroke="#B8862E" stroke-width="3"/><line x1="-4" y1="0" x2="4" y2="0" stroke="#B8862E" stroke-width="3"/></g>
  </g>

  <!-- referring domain nodes -->
  <g font-size="19" fill="#2A3342" text-anchor="middle">
    <g filter="url(#sh)"><rect x="150" y="222" width="220" height="92" rx="14" fill="#fff"/></g><text x="260" y="262" font-weight="700">Jewelry Blog</text><g transform="translate(260,286)" fill="#EBB000"><text font-size="16" text-anchor="middle">DA 74</text></g>
    <g filter="url(#sh)"><rect x="120" y="512" width="220" height="92" rx="14" fill="#fff"/></g><text x="230" y="552" font-weight="700">Fashion Magazine</text><text x="230" y="576" font-size="16" fill="#EBB000">DA 81</text>
    <g filter="url(#sh)"><rect x="180" y="742" width="220" height="92" rx="14" fill="#fff"/></g><text x="290" y="782" font-weight="700">Lifestyle Portal</text><text x="290" y="806" font-size="16" fill="#EBB000">DA 68</text>
    <g filter="url(#sh)"><rect x="1160" y="204" width="220" height="92" rx="14" fill="#fff"/></g><text x="1270" y="244" font-weight="700">Wedding Guide</text><text x="1270" y="268" font-size="16" fill="#EBB000">DA 77</text>
    <g filter="url(#sh)"><rect x="1200" y="494" width="220" height="92" rx="14" fill="#fff"/></g><text x="1310" y="534" font-weight="700">Design Journal</text><text x="1310" y="558" font-size="16" fill="#EBB000">DA 70</text>
    <g filter="url(#sh)"><rect x="1120" y="754" width="220" height="92" rx="14" fill="#fff"/></g><text x="1230" y="794" font-weight="700">Luxury Review</text><text x="1230" y="818" font-size="16" fill="#EBB000">DA 79</text>
  </g>

  <!-- central store node -->
  <g filter="url(#sh)"><circle cx="750" cy="500" r="140" fill="#fff"/></g>
  <circle cx="750" cy="500" r="140" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <g transform="translate(750,462)"><ellipse cx="0" cy="30" rx="52" ry="58" fill="none" stroke="url(#gold)" stroke-width="16"/><g transform="translate(0,-42)"><polygon points="0,-26 26,-8 0,34 -26,-8" fill="url(#dia)" stroke="#8FB8DE" stroke-width="2"/><line x1="0" y1="-26" x2="0" y2="34" stroke="#Bed7ef" stroke-width="1.5"/></g></g>
  <text x="750" y="600" font-size="24" font-weight="700" fill="#2A3342" text-anchor="middle">Your Store</text>

  <!-- authority meter -->
  <g filter="url(#sh)"><rect x="600" y="820" width="300" height="96" rx="18" fill="#2A3342"/></g>
  <text x="640" y="862" font-size="20" fill="#B9C2D0">Domain Authority</text>
  <text x="640" y="898" font-size="34" font-weight="700" fill="#fff">72 <tspan font-size="20" fill="#5FB56A">▲ +19</tspan></text>
</svg>
