<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" fill="none" role="img" aria-label="Digital marketing growth dashboard illustration">
  <defs>
    <linearGradient id="dm-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9A56A"/>
      <stop offset="1" stop-color="#F17E3F"/>
    </linearGradient>
    <linearGradient id="dm-bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F17E3F"/>
      <stop offset="1" stop-color="#E0561F"/>
    </linearGradient>
    <linearGradient id="dm-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F9A56A"/>
      <stop offset="1" stop-color="#F17E3F"/>
    </linearGradient>
    <radialGradient id="dm-glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#F17E3F" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F17E3F" stop-opacity="0"/>
    </radialGradient>
    <filter id="dm-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <circle cx="330" cy="250" r="240" fill="url(#dm-glow)"/>

  <!-- Main dashboard card -->
  <g filter="url(#dm-shadow)">
    <rect x="80" y="110" width="430" height="300" rx="24" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <circle cx="108" cy="140" r="6" fill="#F17E3F"/>
    <circle cx="128" cy="140" r="6" fill="#3a3a3a"/>
    <circle cx="148" cy="140" r="6" fill="#3a3a3a"/>
    <rect x="372" y="132" width="112" height="16" rx="8" fill="#242424"/>

    <line x1="112" y1="352" x2="478" y2="352" stroke="#2b2b2b" stroke-width="2"/>

    <rect x="120" y="300" width="32" height="52" rx="6" fill="#333333"/>
    <rect x="168" y="276" width="32" height="76" rx="6" fill="#3a3a3a"/>
    <rect x="216" y="250" width="32" height="102" rx="6" fill="#3a3a3a"/>
    <rect x="264" y="220" width="32" height="132" rx="6" fill="url(#dm-bar)"/>
    <rect x="312" y="192" width="32" height="160" rx="6" fill="#3a3a3a"/>
    <rect x="360" y="166" width="32" height="186" rx="6" fill="url(#dm-bar)"/>
    <rect x="408" y="138" width="32" height="214" rx="6" fill="url(#dm-bar2)"/>

    <polyline points="136,314 184,296 232,270 280,240 328,210 376,182 424,152"
      fill="none" stroke="url(#dm-line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="424" cy="152" r="6.5" fill="#ffffff"/>
    <circle cx="424" cy="152" r="12" fill="none" stroke="#F17E3F" stroke-width="3"/>
  </g>

  <!-- Growth badge -->
  <g filter="url(#dm-shadow)">
    <circle cx="512" cy="150" r="56" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <path d="M486 162 L502 144 L514 154 L534 130" fill="none" stroke="url(#dm-line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M523 130 L534 130 L534 141" fill="none" stroke="#F17E3F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="512" y="186" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#F9A56A">+248%</text>
  </g>

  <!-- Reach chip -->
  <g filter="url(#dm-shadow)">
    <rect x="96" y="392" width="182" height="64" rx="16" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <circle cx="128" cy="424" r="18" fill="url(#dm-bar2)"/>
    <path d="M120 424 L134 416 L134 432 Z" fill="#ffffff"/>
    <rect x="158" y="410" width="96" height="9" rx="4.5" fill="#333333"/>
    <rect x="158" y="428" width="64" height="9" rx="4.5" fill="#282828"/>
  </g>

  <!-- Audience chip -->
  <g filter="url(#dm-shadow)">
    <rect x="392" y="300" width="176" height="64" rx="16" fill="#191919" stroke="#2b2b2b" stroke-width="1.5"/>
    <circle cx="424" cy="326" r="6.5" fill="#ffffff"/>
    <path d="M411 345 a13 11 0 0 1 26 0 Z" fill="#ffffff"/>
    <rect x="454" y="318" width="92" height="9" rx="4.5" fill="#333333"/>
    <rect x="454" y="336" width="60" height="9" rx="4.5" fill="#282828"/>
  </g>
</svg>
